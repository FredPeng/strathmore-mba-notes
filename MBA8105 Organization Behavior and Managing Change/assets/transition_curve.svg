<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">组织变革转型曲线</title>
  <desc id="desc">展示员工从震惊、否认、愤怒与责备、恐惧与讨价还价、沮丧、探索、决定到融入的情绪与绩效变化。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="0.48" stop-color="#dc2626"/>
      <stop offset="1" stop-color="#16a34a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #172033; }
      .small { font-size: 16px; fill: #526071; }
      .label { font-size: 17px; font-weight: 700; }
      .english { font-size: 14px; font-weight: 500; fill: #64748b; }
      .axis { stroke: #64748b; stroke-width: 2; }
      .guide { stroke: #cbd5e1; stroke-width: 1; stroke-dasharray: 6 7; }
      .dot { fill: #fff; stroke-width: 4; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="1098" height="618" rx="20" fill="url(#bg)" stroke="#d9e2ec"/>
  <text x="550" y="48" text-anchor="middle" font-size="27" font-weight="750">组织变革转型曲线</text>
  <text x="550" y="76" text-anchor="middle" class="small">Transition Curve — adapted from Kübler-Ross</text>

  <line x1="100" y1="500" x2="1035" y2="500" class="axis" marker-end="url(#arrow)"/>
  <line x1="100" y1="500" x2="100" y2="105" class="axis" marker-end="url(#arrow)"/>
  <text x="1025" y="535" text-anchor="end" class="label">时间 Time</text>
  <text transform="translate(38 315) rotate(-90)" text-anchor="middle" class="label">情绪能量 / 绩效</text>
  <text transform="translate(61 315) rotate(-90)" text-anchor="middle" class="english">Emotional energy / performance</text>

  <line x1="100" y1="300" x2="1020" y2="300" class="guide"/>
  <text x="108" y="290" class="small">原有水平</text>

  <path d="M 130 190
           C 170 195, 190 235, 225 245
           C 270 258, 295 315, 335 330
           C 375 345, 405 390, 445 400
           C 485 410, 505 455, 550 455
           C 605 455, 625 385, 680 360
           C 735 335, 770 280, 825 260
           C 880 235, 930 175, 985 145"
        fill="none" stroke="url(#line)" stroke-width="9" stroke-linecap="round" filter="url(#shadow)"/>

  <g>
    <circle cx="145" cy="195" r="8" class="dot" stroke="#2563eb"/>
    <line x1="145" y1="185" x2="145" y2="130" class="guide"/>
    <text x="145" y="112" text-anchor="middle" class="label">震惊</text>
    <text x="145" y="132" text-anchor="middle" class="english">Shock</text>

    <circle cx="225" cy="245" r="8" class="dot" stroke="#4f46e5"/>
    <line x1="225" y1="255" x2="225" y2="305" class="guide"/>
    <text x="225" y="330" text-anchor="middle" class="label">否认</text>
    <text x="225" y="350" text-anchor="middle" class="english">Denial</text>

    <circle cx="335" cy="330" r="8" class="dot" stroke="#c2410c"/>
    <line x1="335" y1="320" x2="335" y2="275" class="guide"/>
    <text x="335" y="240" text-anchor="middle" class="label">愤怒与责备</text>
    <text x="335" y="260" text-anchor="middle" class="english">Anger &amp; Blame</text>

    <circle cx="445" cy="400" r="8" class="dot" stroke="#ea580c"/>
    <line x1="445" y1="410" x2="445" y2="465" class="guide"/>
    <text x="445" y="490" text-anchor="middle" class="label">恐惧与讨价还价</text>
    <text x="445" y="510" text-anchor="middle" class="english">Fear &amp; Bargaining</text>

    <circle cx="550" cy="455" r="9" class="dot" stroke="#dc2626"/>
    <line x1="550" y1="445" x2="550" y2="390" class="guide"/>
    <text x="550" y="355" text-anchor="middle" class="label">沮丧</text>
    <text x="550" y="375" text-anchor="middle" class="english">Depression</text>

    <circle cx="680" cy="360" r="8" class="dot" stroke="#ca8a04"/>
    <line x1="680" y1="350" x2="680" y2="300" class="guide"/>
    <text x="680" y="270" text-anchor="middle" class="label">探索</text>
    <text x="680" y="290" text-anchor="middle" class="english">Exploration</text>

    <circle cx="825" cy="260" r="8" class="dot" stroke="#059669"/>
    <line x1="825" y1="270" x2="825" y2="330" class="guide"/>
    <text x="825" y="355" text-anchor="middle" class="label">决定</text>
    <text x="825" y="375" text-anchor="middle" class="english">Decision</text>

    <circle cx="985" cy="145" r="8" class="dot" stroke="#16a34a"/>
    <line x1="985" y1="155" x2="985" y2="210" class="guide"/>
    <text x="985" y="235" text-anchor="middle" class="label">融入</text>
    <text x="985" y="255" text-anchor="middle" class="english">Integration</text>
  </g>

  <rect x="140" y="555" width="820" height="40" rx="10" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="550" y="581" text-anchor="middle" font-size="16" fill="#1e40af">不同员工可能跳过、重复或同时经历多个阶段；这不是固定的线性预测模型。</text>
</svg>
